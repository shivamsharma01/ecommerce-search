spring:
  application:
    name: search
  elasticsearch:
    # Configure for your environment
    uris: http://localhost:9200

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

# When app.security.enabled=true, configure JWT (same as user service), e.g.:
# spring:
#   security:
#     oauth2:
#       resourceserver:
#         jwt:
#           issuer-uri: ${AUTH_ISSUER_URI:https://auth.example.com}
# Or set SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI in the environment.

app:
  security:
    # Match product service: false for local/tests; true in deployed env with JWT issuer configured
    enabled: ${APP_SECURITY_ENABLED:false}
    # cors-allowed-origins:
    #   - https://your-frontend.example
    # Optional: require OAuth2 scope for POST /api/search (e.g. search.query)
    # required-scope: search.query
