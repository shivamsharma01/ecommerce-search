spring:
  application:
    name: search
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081}
opensearch:
  uris: ${OPENSEARCH_URIS:${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}} # bridge for older envs
  username: ${OPENSEARCH_USERNAME:${SPRING_ELASTICSEARCH_USERNAME:}}
  password: ${OPENSEARCH_PASSWORD:${SPRING_ELASTICSEARCH_PASSWORD:}}
  # Helps detect half-closed connections; pairs with idle eviction in OpenSearchRestClientConfig.
  socket-keep-alive: true

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
