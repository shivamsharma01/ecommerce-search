# Kubernetes Deployment for search microservice (product search / Elasticsearch).
#
# Substitute before apply (or let CI replace tokens):
#   <ARTIFACT_REGISTRY_URL>  e.g. us-central1-docker.pkg.dev/my-project/mcart
#   <VERSION>                  immutable tag (e.g. git SHA from Cloud Build COMMIT_SHA)
#
# Image reference: <ARTIFACT_REGISTRY_URL>/search:<VERSION>
# (Cloud Build in this repo tags: ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/search:${COMMIT_SHA})
#
# Health: management base-path is / → aggregate /health; dedicated probes when enabled in app config.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  labels:
    app: search
    version: "<VERSION>"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: search
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: search
        version: "<VERSION>"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: search
          image: <ARTIFACT_REGISTRY_URL>/search:<VERSION>
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          envFrom:
            - configMapRef:
                name: search-config
            - secretRef:
                name: search-secrets
                optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: search
  labels:
    app: search
    version: "<VERSION>"
spec:
  type: ClusterIP
  selector:
    app: search
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: search-config
  labels:
    app: search
data:
  SERVER_PORT: "8083"
  SPRING_APPLICATION_NAME: "search"
  # Override in cluster (or via Helm/Kustomize)
  SPRING_ELASTICSEARCH_URIS: "http://elasticsearch:9200"
  APP_SECURITY_ENABLED: "true"
  # Set issuer to match user/product services, or use secret/env override
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "https://auth.example.com"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
---
# Secrets (optional): ES credentials, JWT overrides, etc.
# kubectl create secret generic search-secrets \
#   --from-literal=SPRING_ELASTICSEARCH_URIS=https://user:pass@es:9200 \
#   --from-literal=SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://...
